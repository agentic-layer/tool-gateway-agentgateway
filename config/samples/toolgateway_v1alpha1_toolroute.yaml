# Minimal ToolRoute example with tool filtering.
# Apply with: kubectl apply -f toolgateway_v1alpha1_toolroute.yaml
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolGatewayClass
metadata:
  name: agentgateway
  annotations:
    toolgatewayclass.kubernetes.io/is-default-class: "true"
spec:
  controller: runtime.agentic-layer.ai/tool-gateway-agentgateway-controller
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolGateway
metadata:
  name: my-tool-gateway
  namespace: default
spec:
  toolGatewayClassName: agentgateway
---
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolServer
metadata:
  name: my-tool-server
  namespace: default
spec:
  protocol: mcp
  transportType: http
  image: my-tool-server:latest
  port: 8000
  path: /mcp
  replicas: 1
---
# ToolRoute with a cluster ToolServer upstream and a tool-filter restricting
# tools to get_*/list_* while denying any delete-style operation.
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolRoute
metadata:
  name: my-tool-route
  namespace: default
spec:
  toolGatewayRef:
    name: my-tool-gateway
  upstream:
    toolServerRef:
      name: my-tool-server
  toolFilter:
    allow: ["get_*", "list_*"]
    deny: ["*delete*"]
---
# ToolRoute with an external upstream (no ToolServer needed).
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: ToolRoute
metadata:
  name: github-readonly
  namespace: default
spec:
  toolGatewayRef:
    name: my-tool-gateway
  upstream:
    external:
      url: https://github-mcp.example.com/mcp
  toolFilter:
    allow: ["search_issues", "get_*", "list_*"]
    deny: ["force_push"]
